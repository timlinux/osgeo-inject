# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# Run `pre-commit install` to set up the git hooks
# Run `pre-commit run --all-files` to run all checks

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']
      - id: no-commit-to-branch
        name: Prevent commits to main
        args: ['--branch', 'main']

  # JavaScript linting with ESLint
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: ESLint JavaScript
        files: \.(js|mjs)$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-prettier@9.1.0

  # Prettier formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier formatting
        types_or: [javascript, css, json, markdown, yaml]

  # Shell script checks
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: ShellCheck
        args: ['-x']

  # Shell script formatting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.8.0-1
    hooks:
      - id: shfmt
        name: Shell formatting (shfmt)
        args: ['-i', '2', '-ci', '-bn']

  # Spell checking
  - repo: https://github.com/crate-ci/typos
    rev: v1.18.0
    hooks:
      - id: typos
        name: Spell check (typos)

  # License compliance (REUSE)
  - repo: https://github.com/fsfe/reuse-tool
    rev: v3.0.1
    hooks:
      - id: reuse
        name: REUSE license compliance

  # Security - detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  # Nix formatting
  - repo: https://github.com/nix-community/nixpkgs-fmt
    rev: v1.3.0
    hooks:
      - id: nixpkgs-fmt
        name: Nix formatting

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: Markdown lint
        args: ['--fix']

  # CSS linting
  - repo: local
    hooks:
      - id: stylelint
        name: Stylelint CSS
        entry: npx stylelint --fix
        language: node
        types: [css]
        additional_dependencies:
          - stylelint@16.2.1
          - stylelint-config-standard@36.0.0

  # Nginx configuration validation
  - repo: local
    hooks:
      - id: nginx-validate
        name: Nginx config validation
        entry: ./scripts/validate-nginx.sh
        language: script
        files: nginx.*\.conf$
        pass_filenames: true

  # Image optimization check
  - repo: local
    hooks:
      - id: check-image-size
        name: Check image sizes
        entry: ./scripts/check-image-sizes.sh
        language: script
        types: [image]
        pass_filenames: true
