site_name: OSGEO-Inject
site_description: Lightweight affiliate badge system for OSGeo community projects
site_author: Tim Sketcher / Kartoza
site_url: https://timlinux.github.io/OSGEO-Inject/

repo_name: timlinux/OSGEO-Inject
repo_url: https://github.com/timlinux/OSGEO-Inject
edit_uri: edit/main/docs/

copyright: |
  Made with 💗 by <a href="https://kartoza.com">Kartoza</a> |
  <a href="https://github.com/sponsors/timlinux">Donate!</a> |
  <a href="https://github.com/timlinux/OSGEO-Inject">GitHub</a>

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/timlinux/OSGEO-Inject
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/kartaborneo
  analytics:
    provider: custom
    property: osgeo-inject

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: user-guide/getting-started.md
    - Configuration: user-guide/configuration.md
    - Customization: user-guide/customization.md
    - FAQ: user-guide/faq.md
  - Admin Guide:
    - Installation: admin-guide/installation.md
    - Deployment: admin-guide/deployment.md
    - Nginx Configuration: admin-guide/nginx.md
    - Matomo Setup: admin-guide/matomo.md
    - Backup & Restore: admin-guide/backup-restore.md
    - Security: admin-guide/security.md
  - Developer Guide:
    - Architecture: developer-guide/architecture.md
    - Contributing: developer-guide/contributing.md
    - API Reference: developer-guide/api.md
    - Testing: developer-guide/testing.md
  - API:
    - JavaScript API: api/javascript.md
    - Endpoints: api/endpoints.md
