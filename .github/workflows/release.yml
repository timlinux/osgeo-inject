name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build minified assets
        run: npm run build

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          cp src/js/osgeo-inject.min.js dist/
          cp src/css/osgeo-inject.min.css dist/
          cp -r src/images dist/
          cp src/content/announcement.json dist/
          tar -czvf osgeo-inject-${VERSION}.tar.gz -C dist .
          zip -r osgeo-inject-${VERSION}.zip dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            osgeo-inject-*.tar.gz
            osgeo-inject-*.zip

  docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin pygments

      - name: Build docs
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-docs:
    name: Deploy Documentation
    needs: docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    needs: [build, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            osgeo-inject-*.tar.gz
            osgeo-inject-*.zip
          body: |
            ## OSGEO-Inject ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Installation

            Include the following in your HTML:

            ```html
            <script src="https://affiliate.osgeo.org/js/osgeo-inject.min.js" defer></script>
            <link rel="stylesheet" href="https://affiliate.osgeo.org/css/osgeo-inject.min.css">
            ```

            ### Documentation

            Full documentation available at: https://timlinux.github.io/osgeo-inject/

            ---
            Made with 💗 by [Kartoza](https://kartoza.com)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
