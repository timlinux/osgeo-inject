<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>OSGeo Logo</title>
  <defs>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="45" fill="url(#globe)" stroke="#1B5E20" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="45" ry="30" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="50" cy="50" rx="15" ry="45" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="30" ry="45" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <!-- Center vertical line -->
  <line x1="50" y1="5" x2="50" y2="95" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <!-- Center horizontal line -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <!-- OSGeo text -->
  <text x="50" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#fff" text-anchor="middle">OSGeo</text>
</svg>
