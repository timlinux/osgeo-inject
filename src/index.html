<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSGEO-Inject Server</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #333;
      --accent: #4caf50;
      --card-bg: #fff;
      --border: #e0e0e0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --text: #e0e0e0;
        --accent: #66bb6a;
        --card-bg: #2d2d2d;
        --border: #444;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      max-width: 600px;
      text-align: center;
    }
    h1 {
      color: var(--accent);
      margin-bottom: 1rem;
    }
    p { margin-bottom: 1rem; }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 4px;
      transition: all 0.2s;
    }
    a:hover {
      background: var(--accent);
      color: #fff;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 OSGEO-Inject</h1>
    <p>Lightweight affiliate badge system for OSGeo community projects</p>
    <p>This server provides resources for displaying OSGeo affiliation badges on participating project websites.</p>

    <div class="links">
      <a href="/demo">Demo Page</a>
      <a href="/history">Announcement History</a>
      <a href="/health">Health Check</a>
      <a href="https://timlinux.github.io/osgeo-inject/">Documentation</a>
    </div>

    <div class="footer">
      Made with 💗 by <a href="https://kartoza.com">Kartoza</a> |
      <a href="https://github.com/sponsors/timlinux">Donate!</a> |
      <a href="https://github.com/timlinux/osgeo-inject">GitHub</a>
    </div>
  </div>
</body>
</html>
