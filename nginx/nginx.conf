# OSGEO-Inject Nginx Configuration
# Optimized for security and performance

# Worker configuration
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers (applied globally)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # SSL configuration (for HTTPS)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Allowed origins for CORS (OSGeo projects)
    # This map is generated/updated by the onboarding script
    map $http_origin $cors_origin {
        default "";
        # OSGeo Foundation projects
        "~^https?://.*\.osgeo\.org$" $http_origin;
        "~^https?://osgeo\.org$" $http_origin;

        # QGIS
        "~^https?://.*\.qgis\.org$" $http_origin;
        "~^https?://qgis\.org$" $http_origin;

        # GDAL
        "~^https?://.*\.gdal\.org$" $http_origin;
        "~^https?://gdal\.org$" $http_origin;

        # GRASS GIS
        "~^https?://.*\.grass\.osgeo\.org$" $http_origin;
        "~^https?://grass\.osgeo\.org$" $http_origin;

        # GeoServer
        "~^https?://.*\.geoserver\.org$" $http_origin;
        "~^https?://geoserver\.org$" $http_origin;

        # PostGIS
        "~^https?://.*\.postgis\.net$" $http_origin;
        "~^https?://postgis\.net$" $http_origin;

        # OpenLayers
        "~^https?://.*\.openlayers\.org$" $http_origin;
        "~^https?://openlayers\.org$" $http_origin;

        # MapServer
        "~^https?://.*\.mapserver\.org$" $http_origin;
        "~^https?://mapserver\.org$" $http_origin;

        # GeoNode
        "~^https?://.*\.geonode\.org$" $http_origin;
        "~^https?://geonode\.org$" $http_origin;

        # pgRouting
        "~^https?://.*\.pgrouting\.org$" $http_origin;
        "~^https?://pgrouting\.org$" $http_origin;

        # Leaflet (community project)
        "~^https?://.*\.leafletjs\.com$" $http_origin;
        "~^https?://leafletjs\.com$" $http_origin;

        # Development/testing
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;

        # BEGIN CUSTOM ORIGINS
        # Custom origins added by onboarding script go here
        # END CUSTOM ORIGINS
    }

    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name affiliate.osgeo.org;

        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name affiliate.osgeo.org;

        # SSL certificates (managed by Let's Encrypt/ACME)
        ssl_certificate /etc/ssl/certs/affiliate.osgeo.org.crt;
        ssl_certificate_key /etc/ssl/private/affiliate.osgeo.org.key;

        # Document root
        root /var/www/osgeo-inject;

        # Security headers for this server
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;

        # Static assets with CORS
        location /js/ {
            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Accept, Content-Type";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Caching
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;

            # Serve JavaScript
            types {
                application/javascript js;
            }

            try_files $uri =404;
        }

        location /css/ {
            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Accept, Content-Type";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Caching
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;

            try_files $uri =404;
        }

        location /images/ {
            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Max-Age 86400 always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Long cache for images (they rarely change)
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;

            try_files $uri =404;
        }

        location /content/ {
            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Accept, Content-Type";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Short cache for content (announcements change)
            expires 15m;
            add_header Cache-Control "public, max-age=900, must-revalidate" always;

            # JSON content type
            types {
                application/json json;
            }

            try_files $uri =404;
        }

        # Announcement history page
        location /history {
            alias /var/www/osgeo-inject/history.html;
            default_type text/html;
        }

        # Demo/test page
        location /demo {
            alias /var/www/osgeo-inject/demo.html;
            default_type text/html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Default location
        location / {
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            internal;
        }

        location = /50x.html {
            internal;
        }
    }

    # Matomo reverse proxy (optional - if self-hosting Matomo)
    upstream matomo {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name matomo.affiliate.osgeo.org;

        ssl_certificate /etc/ssl/certs/affiliate.osgeo.org.crt;
        ssl_certificate_key /etc/ssl/private/affiliate.osgeo.org.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://matomo;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # Matomo tracking endpoint with higher rate limit
        location /matomo.php {
            limit_req zone=api burst=50 nodelay;

            # CORS for tracking
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://matomo;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
